function loadStore(){
  try { const r = localStorage.getItem(STORE_KEY); if(r){ const p=JSON.parse(r); if(!p.members||!p.members.length) p.members=SEED_MEMBERS.map(m=>({...m})); return p; } } catch(e){}
  return structuredClone(SEED);
}
function saveStore(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){} }

function Tri({open}){

}
function SecRow({icon,label,open,active,onToggle,onNav}){
  return <div className={"group flex items-center gap-0.5 pl-1 pr-2 py-1.5 rounded-md transition "+(active?"bg-[rgba(55,53,47,.08)] text-ntext font-medium":"text-nsub hov")}>

      <span className="w-4 text-center text-nfaint shrink-0 text-[13px]">{icon}</span>
      <span className="truncate text-[14px]">{label}</span>
    </button>
  </div>;
}
function ChildRow({icon,label,active,locked,onClick}){

    {icon!==undefined && <span className="shrink-0 grid place-items-center w-3 text-nfaint">{icon}</span>}
    <span className="truncate">{label}</span>
    {locked && <span className="ml-auto text-[10px]">🔒</span>}
  </button>;
}

function Dashboard({store, go}){
  const active = store.projects.filter(p=>!["Delivered","Archived"].includes(p.status));
  const dueSoon = store.projects.filter(p=>{
    const d=(new Date(p.due)-new Date())/86400000; return d>=0 && d<=10 && !["Delivered","Archived"].includes(p.status);
  }).sort((a,b)=>new Date(a.due)-new Date(b.due));
  const msgCount = store.channels.reduce((n,c)=>n+c.messages.length,0);
  const stats=[
    {label:"진행 중 프로젝트",val:active.length,sub:"진행 · 리뷰 · 킥오프",dot:"#0f9960",act:()=>go("projects")},

    {label:"전체 메시지",val:msgCount,sub:store.channels.length+"개 채널",dot:"#2383e2",act:()=>go("channels")},
    {label:"활성 멤버",val:MEMBERS.length-1,sub:"+ 외부 협업 1",dot:"#d9730d",act:()=>go("members")},
  ];
  return <Section title="대시보드" desc="오늘의 sia.haus 한눈에 보기">
    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
      {stats.map((s,i)=>(

        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-[15px]">진행 중 프로젝트</h3>
          <button onClick={()=>go("projects")} className="text-[13px] text-nsub hover:text-ntext">보드 열기 →</button>

        <div className="-mx-2">
          {active.map(p=>(
            <button key={p.id} onClick={()=>go("projects")} className="w-full flex items-center gap-3 px-2 py-2 rounded-md hov text-left transition">

              <div className="min-w-0 flex-1">
                <div className="text-[14px] font-medium truncate text-ntext">{p.name}</div>
                <div className="text-[12px] text-nfaint">{p.domain} · {p.client} · ~{p.due}</div>
              </div>
              <Tag bg={PRIORITY[p.priority].bg} fg={PRIORITY[p.priority].fg}>{p.priority}</Tag>

      <div className="ncard nshadow p-4" id="dash-activity">
        <h3 className="font-semibold text-[15px] mb-3">최근 활동</h3>
        <div className="space-y-3">
          {store.activity.map(a=>(
            <div key={a.id} className="flex gap-2.5">
              <Avatar id={a.who} size={24}/>
              <div className="min-w-0">
                <div className="text-[13px] leading-snug text-ntext"><b className="font-semibold">{member(a.who).name}</b> {a.text}</div>
                <div className="text-[11px] text-nfaint">{a.t.slice(5)}</div>
              </div>
            </div>
          ))}
        </div>

    </div>
    <div className="ncard nshadow p-4 mt-4" id="dash-due">
      <h3 className="font-semibold text-[15px] mb-3">다가오는 마감</h3>
      <div className="flex gap-3 overflow-x-auto scrollthin pb-1">
        {dueSoon.length===0 && <div className="text-sm text-nfaint">임박한 마감이 없습니다.</div>}
        {dueSoon.map(p=>{
          const d=Math.ceil((new Date(p.due)-new Date())/86400000);
          return <div key={p.id} className="ncard p-3 min-w-[190px]">
            <div className="text-[11px] text-nfaint">{p.due}</div>
            <div className="text-[13px] font-medium mt-1 line-clamp-2 text-ntext">{p.name}</div>
            <div className="mt-2"><Tag bg={d<=2?"#ffe2dd":"#fbf3db"} fg={d<=2?"#5d1715":"#5c4b00"}>D-{d}</Tag></div>

    </div>
  </Section>;
}

const REACT_EMOJIS = ["👍","✅","👀","🔥","❤️","🎉","😄","🙏"];
function MsgText({text}){
  const parts = String(text).split(/(@[가-힣A-Za-z]+)/g);
  return <div className="text-[14px] text-ntext whitespace-pre-wrap leading-relaxed">
    {parts.map((p,i)=> (p.startsWith("@") && MEMBERS.some(m=>"@"+m.name===p))
      ? <span key={i} className="px-1 rounded bg-[#eae4f2] text-[#412a5e] font-medium">{p}</span>
      : <span key={i}>{p}</span>)}
  </div>;
}
function Reactions({m,onToggle}){
  const r = m.reactions||{};
  const keys = Object.keys(r).filter(k=>r[k].length>0);
  if(keys.length===0) return null;
  return <div className="flex flex-wrap gap-1 mt-1.5">
    {keys.map(k=>{
      const mine = r[k].includes(ME.id);
      return <button key={k} onClick={()=>onToggle(k)} className={"flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[12px] border transition "+(mine?"bg-[#e7f0fb] border-[#9cc4ee] text-[#1a4d80]":"bg-sidebar border-line text-nsub hover:border-[#c7c6c3]")}>
        <span>{k}</span><span>{r[k].length}</span>
      </button>;
    })}
  </div>;
}

function Channels({store,setStore,cur}){
  const [text,setText]=useState("");
  const [thread,setThread]=useState(null);
  const [rtext,setRtext]=useState("");
  const [picker,setPicker]=useState(null);
  const [pane,setPane]=useState(null);
  const [mq,setMq]=useState(null);
  const [rmq,setRmq]=useState(null);
  const endRef=useRef(null);
  const ch = store.channels.find(c=>c.id===cur) || store.channels[0];
  useEffect(()=>{ endRef.current && endRef.current.scrollIntoView(); },[cur,ch&&ch.messages.length]);
  useEffect(()=>{ setThread(null); setPane(null); setPicker(null); setRmq(null); },[cur]);

  function patch(msgId,fn){ setStore(s=>{const ns=structuredClone(s);const c=ns.channels.find(x=>x.id===ch.id);const m=c.messages.find(x=>x.id===msgId);if(m)fn(m);return ns;}); }
  const nowStr=()=>new Date().toISOString().slice(0,16).replace("T"," ");
  function send(){
    if(!text.trim()) return;
    const t=nowStr();
    const msg={id:"m"+Date.now(),who:ME.id,t,text:text.trim(),reactions:{},replies:[]};
    setStore(s=>{const ns=structuredClone(s);ns.channels.find(c=>c.id===ch.id).messages.push(msg);
      ns.activity.unshift({id:"a"+Date.now(),who:ME.id,t,text:`#${ch.name} 에 메시지 작성`});ns.activity=ns.activity.slice(0,8);return ns;});
    setText(""); setMq(null);
  }
  function toggleReact(msgId,emoji){ patch(msgId,m=>{m.reactions=m.reactions||{};const a=m.reactions[emoji]||[]; m.reactions[emoji]=a.includes(ME.id)?a.filter(x=>x!==ME.id):[...a,ME.id]; if(m.reactions[emoji].length===0) delete m.reactions[emoji];}); setPicker(null); }
  function togglePin(msgId){ patch(msgId,m=>{m.pinned=!m.pinned;}); }
  function toggleSave(msgId){ patch(msgId,m=>{m.saved=!m.saved;}); }
  function sendReply(msgId){ if(!rtext.trim())return; patch(msgId,m=>{m.replies=m.replies||[];m.replies.push({id:"r"+Date.now(),who:ME.id,t:nowStr(),text:rtext.trim()});}); setRtext(""); setRmq(null); }
  function onRInput(v){ setRtext(v); const mt=v.match(/@([가-힣A-Za-z]*)$/); setRmq(mt?mt[1]:null); }
  function pickRMention(name){ setRtext(t=>t.replace(/@([가-힣A-Za-z]*)$/,"@"+name+" ")); setRmq(null); }

  function onInput(v){ setText(v); const mt=v.match(/@([가-힣A-Za-z]*)$/); setMq(mt?mt[1]:null); }
  function pickMention(name){ setText(t=>t.replace(/@([가-힣A-Za-z]*)$/,"@"+name+" ")); setMq(null); }
  const mentionList = mq!==null ? MEMBERS.filter(m=>m.id!=="col"&&m.name.includes(mq)).slice(0,5) : [];
  const rMentionList = rmq!==null ? MEMBERS.filter(m=>m.id!=="col"&&m.name.includes(rmq)).slice(0,5) : [];

  const pins = ch.messages.filter(m=>m.pinned);
  const saved = ch.messages.filter(m=>m.saved);
  const threadMsg = thread && ch.messages.find(m=>m.id===thread);

  const Msg = ({m,compact})=>(
    <div className="group relative flex gap-3 px-2 -mx-2 py-1 rounded-md hover:bg-[rgba(55,53,47,.035)]">
      <Avatar id={m.who} size={34}/>
      <div className="min-w-0 flex-1">
        <div className="flex items-baseline gap-2">
          <b className="font-semibold text-[14px]">{member(m.who).name}</b>
          <span className="text-[11px] text-nfaint">{member(m.who).role}</span>
          <span className="text-[11px] text-nfaint">{m.t.slice(5)}</span>
          {m.pinned && <span className="text-[11px] text-[#d9730d]">📌 고정됨</span>}
        </div>
        <MsgText text={m.text}/>
        <Reactions m={m} onToggle={(e)=>toggleReact(m.id,e)}/>
        {!compact && (m.replies&&m.replies.length>0) &&
          <button onClick={()=>setThread(m.id)} className="mt-1.5 inline-flex items-center gap-1.5 text-[12px] text-nblue hover:underline">
            <span className="flex -space-x-1">{[...new Set(m.replies.map(r=>r.who))].slice(0,3).map(w=><span key={w} className="ring-2 ring-white rounded-full"><Avatar id={w} size={16}/></span>)}</span>
            {m.replies.length}개 답글
          </button>}
      </div>
      {!compact && <div className="absolute -top-3 right-2 hidden group-hover:flex items-center gap-0.5 bg-page border border-line rounded-md nshadow px-0.5 py-0.5 z-10">
        <button onClick={()=>setPicker(picker===m.id?null:m.id)} className="w-7 h-7 grid place-items-center rounded hover:bg-sidebar text-[14px]">😊</button>
        <button onClick={()=>setThread(m.id)} className="w-7 h-7 grid place-items-center rounded hover:bg-sidebar text-[13px]">💬</button>
        <button onClick={()=>togglePin(m.id)} className={"w-7 h-7 grid place-items-center rounded hover:bg-sidebar text-[12px] "+(m.pinned?"opacity-100":"opacity-70")}>📌</button>
        <button onClick={()=>toggleSave(m.id)} className={"w-7 h-7 grid place-items-center rounded hover:bg-sidebar text-[12px] "+(m.saved?"opacity-100":"opacity-70")}>🔖</button>
      </div>}
      {!compact && picker===m.id && <div className="absolute top-6 right-2 z-20 bg-page border border-line rounded-lg nshadow px-1.5 py-1 flex gap-0.5">
        {REACT_EMOJIS.map(e=><button key={e} onClick={()=>toggleReact(m.id,e)} className="w-8 h-8 grid place-items-center rounded hover:bg-sidebar text-[16px]">{e}</button>)}
      </div>}
    </div>
  );

  return <div className="fadein flex h-full bg-page">
    <div className="flex-1 flex flex-col min-w-0">
      <div className="px-6 py-3 border-b border-line flex items-center gap-2 shrink-0 relative">
        <span className="text-nfaint">#</span><span className="font-semibold text-[15px]">{ch.name}</span>
        {ch.locked && <Tag bg="#ffe2dd" fg="#5d1715">리더 공지</Tag>}
        <div className="ml-auto flex items-center gap-1">
          <button onClick={()=>setPane(pane==="pins"?null:"pins")} className={"text-[12px] px-2 py-1 rounded-md hover:bg-sidebar "+(pane==="pins"?"bg-sidebar text-ntext":"text-nsub")}>📌 {pins.length}</button>
          <button onClick={()=>setPane(pane==="saved"?null:"saved")} className={"text-[12px] px-2 py-1 rounded-md hover:bg-sidebar "+(pane==="saved"?"bg-sidebar text-ntext":"text-nsub")}>🔖 {saved.length}</button>
        </div>
        {pane && <div className="absolute right-4 top-12 z-30 w-80 bg-page border border-line rounded-lg nshadow p-2 max-h-[60vh] overflow-y-auto scrollthin">
          <div className="text-[12px] font-semibold text-nsub px-1 pb-1">{pane==="pins"?"📌 고정된 메시지":"🔖 저장한 메시지"}</div>
          {(pane==="pins"?pins:saved).length===0 && <div className="text-[12px] text-nfaint px-1 py-2">없음</div>}
          {(pane==="pins"?pins:saved).map(m=>(
            <button key={m.id} onClick={()=>{setThread(m.id);setPane(null);}} className="block w-full text-left p-2 rounded-md hover:bg-sidebar">
              <div className="flex items-center gap-1.5"><Avatar id={m.who} size={18}/><b className="text-[12px] font-semibold">{member(m.who).name}</b><span className="text-[10px] text-nfaint">{m.t.slice(5)}</span></div>
              <div className="text-[12px] text-nsub mt-0.5 line-clamp-2">{m.text}</div>
            </button>
          ))}
        </div>}
      </div>

      <div className="flex-1 overflow-y-auto scrollthin px-6 py-4">
        {ch.messages.length===0 && <div className="text-sm text-nfaint mt-8 text-center">아직 메시지가 없습니다. 첫 메시지를 남겨보세요.</div>}
        {ch.messages.map(m=><Msg key={m.id} m={m}/>)}
        <div ref={endRef}/>
      </div>

      <div className="px-6 py-3 border-t border-line shrink-0 relative">
        {mentionList.length>0 && <div className="absolute bottom-full left-6 mb-1 w-60 bg-page border border-line rounded-lg nshadow p-1 z-20">
          {mentionList.map(m=><button key={m.id} onClick={()=>pickMention(m.name)} className="w-full flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-sidebar text-left"><Avatar id={m.id} size={20}/><span className="text-[13px]">{m.name}</span><span className="text-[11px] text-nfaint">{m.role}</span></button>)}
        </div>}
        <div className="flex items-center gap-2 bg-page border border-[#dcdbd7] rounded-lg px-3 py-2.5">
          <input value={text} onChange={e=>onInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&mentionList.length>0){e.preventDefault();pickMention(mentionList[0].name);}else if(e.key==="Enter"){send();}}}
            placeholder={`#${ch.name} 에 메시지 보내기…  (@로 멘션)`} className="flex-1 bg-transparent outline-none text-sm" />
          <button onClick={send} className="text-sm font-medium btn-dark px-3 py-1 rounded-md">보내기</button>
        </div>
      </div>
    </div>

    {threadMsg && <div className="w-[380px] shrink-0 border-l border-line flex flex-col bg-page">
      <div className="px-4 py-3 border-b border-line flex items-center justify-between shrink-0">
        <span className="font-semibold text-[14px]">스레드</span>
        <button onClick={()=>setThread(null)} className="w-7 h-7 grid place-items-center rounded hover:bg-sidebar text-nsub">✕</button>
      </div>
      <div className="flex-1 overflow-y-auto scrollthin px-4 py-3">
        <Msg m={threadMsg} compact/>
        <div className="text-[11px] text-nfaint border-b border-line pb-1 mb-2 mt-3">{(threadMsg.replies||[]).length}개 답글</div>
        {(threadMsg.replies||[]).map(r=>(
          <div key={r.id} className="flex gap-2.5 py-1.5">
            <Avatar id={r.who} size={28}/>
            <div className="min-w-0">
              <div className="flex items-baseline gap-1.5"><b className="text-[13px] font-semibold">{member(r.who).name}</b><span className="text-[10px] text-nfaint">{r.t.slice(5)}</span></div>
              <MsgText text={r.text}/>
            </div>
          </div>
        ))}
      </div>
      <div className="px-3 py-3 border-t border-line shrink-0 relative">
        {rMentionList.length>0 && <div className="absolute bottom-full left-3 right-3 mb-1 bg-page border border-line rounded-lg nshadow p-1 z-20">
          {rMentionList.map(m=><button key={m.id} onClick={()=>pickRMention(m.name)} className="w-full flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-sidebar text-left"><Avatar id={m.id} size={20}/><span className="text-[13px]">{m.name}</span><span className="text-[11px] text-nfaint">{m.role}</span></button>)}
        </div>}
        <div className="flex items-center gap-2 bg-page border border-[#dcdbd7] rounded-lg px-3 py-2">
          <input value={rtext} onChange={e=>onRInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&rMentionList.length>0){e.preventDefault();pickRMention(rMentionList[0].name);}else if(e.key==="Enter"){sendReply(threadMsg.id);}}} placeholder="답글 남기기… (@로 멘션)" className="flex-1 bg-transparent outline-none text-sm"/>
          <button onClick={()=>sendReply(threadMsg.id)} className="text-sm font-medium btn-dark px-3 py-1 rounded-md">답글</button>
        </div>
      </div>
    </div>}
  </div>;
}

/* 프로젝트 보드 (카드 클릭 → 전체화면 상세) */
function Projects({store,setStore,onOpen}){
  const [adding,setAdding]=useState(false);
  function move(pid,dir){
    setStore(s=>{const ns=structuredClone(s);const p=ns.projects.find(x=>x.id===pid);
      let i=STATUSES.indexOf(p.status); i=Math.max(0,Math.min(STATUSES.length-1,i+dir)); p.status=STATUSES[i];return ns;});
  }
  return <Section title="프로젝트 보드" desc="상태별 보드 · 모든 프로젝트는 추적된다"
    right={<button onClick={()=>setAdding(true)} className="text-[13px] btn-dark font-medium px-3 py-1.5 rounded-md">+ 새 프로젝트</button>}>
    <div className="flex gap-3 overflow-x-auto scrollthin pb-2">
      {STATUSES.map(st=>{
        const items=store.projects.filter(p=>p.status===st);
        const meta=STATUS_META[st];
        return <div key={st} className="bg-col rounded-lg p-2 min-w-[268px] w-[268px] shrink-0">
          <div className="flex items-center gap-1.5 px-1.5 py-1.5">
            <Tag bg={meta.bg} fg={meta.fg} dot={meta.dot}>{meta.ko}</Tag>
            <span className="text-[12px] text-nfaint">{items.length}</span>
          </div>
          <div className="space-y-2">
            {items.map(p=>(
              <div key={p.id} className="bg-page nshadow nshadow-h border border-line rounded-md p-2.5 transition cursor-pointer" onClick={()=>onOpen(p.id)}>
                <div className="text-[14px] font-medium leading-snug text-ntext">{p.name}</div>
                <div className="flex items-center gap-1.5 mt-2 flex-wrap">
                  <Tag bg={PRIORITY[p.priority].bg} fg={PRIORITY[p.priority].fg} dot={PRIORITY[p.priority].dot}>{p.priority}</Tag>
                  <Tag>{p.domain}</Tag>
                </div>
                <div className="flex items-center justify-between mt-2.5">
                  <span className="text-[11px] text-nfaint">~{p.due.slice(5)}</span>
                  <div className="flex items-center gap-2">
                    {p.tasks.length>0 && <span className="text-[11px] text-nfaint">{p.tasks.filter(t=>t.done).length}/{p.tasks.length} ✓</span>}
                    <Avatar id={p.owner} size={20}/>
                  </div>
                </div>
                <div className="flex gap-1 mt-2 pt-2 border-t border-line2" onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>move(p.id,-1)} className="flex-1 text-[12px] py-1 rounded hov text-nsub">←</button>
                  <button onClick={()=>move(p.id,1)} className="flex-1 text-[12px] py-1 rounded hov text-nsub">→</button>
                </div>
              </div>
            ))}
            {items.length===0 && <div className="text-[12px] text-nfaint px-1.5 py-2">비어 있음</div>}
          </div>
        </div>;
      })}
    </div>
    {adding && <AddProject onClose={()=>setAdding(false)} onAdd={(p)=>{
      setStore(s=>{const ns=structuredClone(s);ns.projects.unshift(p);
        ns.activity.unshift({id:"a"+Date.now(),who:ME.id,t:new Date().toISOString().slice(0,16).replace("T"," "),text:`새 프로젝트 ‘${p.name}’ 생성`});return ns;});
      setAdding(false);
    }}/>}
  </Section>;
}

/* 프로젝트 상세 — 전체화면 노션식 페이지 */
function PropRow({icon,label,children}){
  return <div className="flex items-start gap-2 py-1.5">
    <div className="flex items-center gap-1.5 w-[108px] shrink-0 text-[13px] text-nsub">
      <span className="w-4 text-center text-nfaint">{icon}</span>{label}
    </div>
    <div className="flex-1 text-[14px] text-ntext min-w-0">{children}</div>
  </div>;
}
function ProjectDetail({store,setStore,id,onBack}){
  const [nt,setNt]=useState("");
  const p = store.projects.find(x=>x.id===id);
  if(!p) return <div className="max-w-[900px] mx-auto text-sm text-nfaint">프로젝트를 찾을 수 없습니다. <button onClick={onBack} className="underline">보드로</button></div>;
  const meta=STATUS_META[p.status];
  function move(dir){ setStore(s=>{const ns=structuredClone(s);const x=ns.projects.find(y=>y.id===id);let i=STATUSES.indexOf(x.status);i=Math.max(0,Math.min(STATUSES.length-1,i+dir));x.status=STATUSES[i];return ns;}); }
  function toggleTask(tid){ setStore(s=>{const ns=structuredClone(s);const x=ns.projects.find(y=>y.id===id);const t=x.tasks.find(z=>z.id===tid);t.done=!t.done;return ns;}); }
  function addTask(){ if(!nt.trim())return; setStore(s=>{const ns=structuredClone(s);ns.projects.find(y=>y.id===id).tasks.push({id:"t"+Date.now(),name:nt.trim(),done:false});return ns;}); setNt(""); }
  const todo=p.tasks.filter(t=>!t.done), done=p.tasks.filter(t=>t.done);
  const TaskCard=({t})=>(
    <button onClick={()=>toggleTask(t.id)} className="w-full bg-page nshadow nshadow-h border border-line rounded-md p-2.5 text-left text-[13.5px] text-ntext flex items-center gap-2">
      <span className={"w-4 h-4 rounded grid place-items-center text-[10px] shrink-0 "+(t.done?"bg-[#0f9960] text-white":"border border-[#c7c6c3]")}>{t.done?"✓":""}</span>
      <span className={t.done?"line-through text-nfaint":""}>{t.name}</span>
    </button>
  );
  return <div className="fadein max-w-[1000px] mx-auto">
    <button onClick={onBack} className="text-[13px] text-nsub hover:text-ntext mb-4 inline-flex items-center gap-1">← 프로젝트 보드</button>
    <div className="flex items-start gap-3">
      <h1 className="text-[30px] font-bold tracking-tight text-ntext flex-1 leading-tight">{p.name}</h1>
      <span className="mt-2"><Tag bg={meta.bg} fg={meta.fg} dot={meta.dot}>{meta.ko}</Tag></span>
    </div>

    {/* 속성 */}
    <div className="mt-4 border-t border-b border-line py-2">
      <PropRow icon="◷" label="상태">
        <div className="flex items-center gap-2">
          <Tag bg={meta.bg} fg={meta.fg} dot={meta.dot}>{meta.ko}</Tag>
          <button onClick={()=>move(-1)} className="text-[12px] px-2 py-0.5 rounded border border-line hov text-nsub">← 이전</button>
          <button onClick={()=>move(1)} className="text-[12px] px-2 py-0.5 rounded border border-line hov text-nsub">다음 →</button>
        </div>

      <PropRow icon="○" label="클라이언트">{p.client}</PropRow>

      <PropRow icon="▤" label="마감일">{p.due}</PropRow>
      <PropRow icon="#" label="진행률">{p.tasks.length?Math.round(done.length/p.tasks.length*100):0}% <span className="text-nfaint">({done.length}/{p.tasks.length})</span></PropRow>
    </div>

    {/* work process 보드 */}
    <h3 className="text-[16px] font-bold text-ntext mt-7 mb-3">작업 보드 (Work Process)</h3>
    <div className="flex gap-3 overflow-x-auto scrollthin pb-2">
      <div className="bg-col rounded-lg p-2 min-w-[300px] w-[300px] shrink-0">
        <div className="flex items-center gap-1.5 px-1.5 py-1.5"><Tag bg="#fbf3db" fg="#5c4b00" dot="#dfab01">할 일</Tag><span className="text-[12px] text-nfaint">{todo.length}</span></div>
        <div className="space-y-2">
          {todo.map(t=><TaskCard key={t.id} t={t}/>)}
          <div className="flex items-center gap-1.5 bg-page border border-line rounded-md px-2.5 py-1.5">
            <span className="text-nfaint text-[14px]">+</span>
            <input value={nt} onChange={e=>setNt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="새 작업 추가" className="flex-1 bg-transparent outline-none text-[13.5px]"/>
          </div>
        </div>
      </div>
      <div className="bg-col rounded-lg p-2 min-w-[300px] w-[300px] shrink-0">
        <div className="flex items-center gap-1.5 px-1.5 py-1.5"><Tag bg="#dbeddb" fg="#1c3829" dot="#0f9960">완료</Tag><span className="text-[12px] text-nfaint">{done.length}</span></div>

          {done.map(t=><TaskCard key={t.id} t={t}/>)}

}

          <div className="font-semibold mt-2 text-ntext">{tp.name}</div>

      <div className="grid grid-cols-2 gap-3">
        <Field label="역할(직책)"><input className="inp" value={f.role} onChange={e=>setF({...f,role:e.target.value})} placeholder="예: 3D Artist"/></Field>

    <div className="flex justify-end gap-2 mt-5">

function Members({store,setStore}){
  const [editing,setEditing]=useState(null);
  const list = store.members||MEMBERS;
  function saveMember(data){
    setStore(s=>{const ns=structuredClone(s); ns.members=ns.members||[];
      if(editing==="new"){ ns.members.push({...data,id:"u"+Date.now()}); }
      else { const i=ns.members.findIndex(x=>x.id===editing); if(i>=0) ns.members[i]={...ns.members[i],...data}; }
      return ns;});
    setEditing(null);
  }
  function removeMember(id){ const nm=member(id).name; if(!confirm(`${nm} 님을 멤버에서 삭제할까요?`)) return; setStore(s=>({...structuredClone(s), members:(s.members||[]).filter(x=>x.id!==id)})); setEditing(null); }
  const editMember = (editing && editing!=="new") ? list.find(m=>m.id===editing) : null;
  return <Section title="멤버 · 역할" desc="조직 구성과 권한 등급 · 카드를 눌러 수정"
    right={<button onClick={()=>setEditing("new")} className="text-[13px] btn-dark font-medium px-3 py-1.5 rounded-md">+ 멤버 추가</button>}>
    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
      {list.map(m=>{
        const g=GRADE_PERMS[memGrade(m)];
        return <div key={m.id} onClick={()=>setEditing(m.id)} className="group ncard nshadow nshadow-h p-4 flex items-start gap-3 cursor-pointer transition">
          <Avatar id={m.id} size={42}/>
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-1.5"><span className="font-semibold text-ntext truncate">{m.name}</span>{m.id===ME.id && <span className="text-[10px] text-nfaint px-1 py-0.5 rounded bg-sidebar shrink-0">나</span>}</div>
            <div className="text-[12px] text-nsub truncate">{m.role}</div>
            <div className="mt-1.5"><Tag bg={g.bg} fg={g.fg}>{memGrade(m)}</Tag></div>
          </div>
          <div className="flex flex-col items-end gap-1 shrink-0">
            <span className="opacity-0 group-hover:opacity-100 transition text-[11px] text-nfaint">수정 ✎</span>
            {m.id!==ME.id && <button onClick={(e)=>{e.stopPropagation();removeMember(m.id);}} title="삭제" className="opacity-0 group-hover:opacity-100 transition w-6 h-6 grid place-items-center rounded-md text-nfaint hover:bg-[#fcebeb] hover:text-[#a32d2d]">✕</button>}
          </div>
        </div>;
      })}
    </div>
    {editing && <MemberForm init={editMember} onClose={()=>setEditing(null)} onSave={saveMember} onDelete={()=>removeMember(editing)}/>}
    <div className="ncard nshadow p-5 mt-4">
      <h3 className="font-semibold mb-3">권한 등급 요약</h3>
      <div className="overflow-x-auto"><table className="w-full text-sm">
        <thead><tr className="text-nfaint text-[12px] text-left border-b border-line">
          <th className="py-2 pr-4 font-medium">역할</th><th className="pr-4 font-medium">채널</th><th className="pr-4 font-medium">프로젝트</th><th className="font-medium">외부 접근</th></tr></thead>
        <tbody className="text-ntext">
          {[["CEO","전체 + 공지작성","전체 관리","전체"],
            ["Creative Director","전체 + 공지작성","전체 관리","전체"],
            ["Lead","업무채널 + 일부공지","담당 도메인","담당"],
            ["Member","업무채널 작성","담당 카드","담당"],
            ["Collaborator","초대 채널만","초대 카드만","초대분만"]].map((r,i)=>(
            <tr key={i} className="border-b border-line last:border-0">
              {r.map((c,j)=><td key={j} className="py-2.5 pr-4">{c}</td>)}
            </tr>
          ))}
        </tbody>
      </table></div>
    </div>
  </Section>;
}

function Modal({children,onClose}){
  useEffect(()=>{const h=e=>e.key==="Escape"&&onClose();window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);
  return <div className="fixed inset-0 z-50 grid place-items-center p-4" style={{background:"rgba(15,15,15,.35)"}} onClick={onClose}>
    <div className="bg-page rounded-lg p-5 w-full max-w-lg max-h-[88vh] overflow-y-auto scrollthin fadein nshadow border border-line" onClick={e=>e.stopPropagation()}>{children}</div>
  </div>;
}

function App(){
  const [store,setStore]=useState(loadStore);
  if(store.members && store.members.length) MEMBERS = store.members;
  const [view,setView]=useState("dashboard");
  const [menu,setMenu]=useState(false);
  const [cur,setCur]=useState(store.channels[0].id);
  const [proj,setProj]=useState(null);
  const [exp,setExp]=useState({dashboard:true,channels:true,projects:true,meetings:false,knowledge:false,members:false});
  const [mFocus,setMFocus]=useState(null);
  const [kFocus,setKFocus]=useState(null);
  const nonce=useRef(0);
  useEffect(()=>saveStore(store),[store]);
  function reset(){ if(confirm("데모 데이터를 초기 상태로 되돌릴까요?")){localStorage.removeItem(STORE_KEY);setStore(structuredClone(SEED));setCur(SEED.channels[0].id);setProj(null);} }

  const chGroups = useMemo(()=>{
    const g={}; store.channels.forEach(c=>{(g[c.group]=g[c.group]||[]).push(c)}); return g;
  },[store.channels]);

  const toggle=id=>setExp(e=>({...e,[id]:!e[id]}));
  function goSec(id){ if(id==="projects") setProj(null); setView(id); setExp(e=>({...e,[id]:true})); setMenu(false); }
  function openProject(id){ setProj(id); setView("projects"); setExp(e=>({...e,projects:true})); setMenu(false); }
  function focusItem(section,id){
    nonce.current++; const f={id,n:nonce.current};
    if(section==="meetings"){ setMFocus(f); setView("meetings"); }
    if(section==="knowledge"){ setKFocus(f); setView("knowledge"); }
    setExp(e=>({...e,[section]:true})); setMenu(false);
  }
  function openChannel(id){ setCur(id); setView("channels"); setExp(e=>({...e,channels:true})); setMenu(false); }

  const projectsBody = (proj && store.projects.find(p=>p.id===proj))
    ? <ProjectDetail store={store} setStore={setStore} id={proj} onBack={()=>setProj(null)}/>
    : <Projects store={store} setStore={setStore} onOpen={openProject}/>;
  const Body={dashboard:<Dashboard store={store} go={goSec}/>,channels:<Channels store={store} setStore={setStore} cur={cur}/>,
    projects:projectsBody,meetings:<Meetings store={store} focus={mFocus}/>,
    knowledge:<Knowledge store={store} focus={kFocus}/>,members:<Members store={store} setStore={setStore}/>}[view];

  const Side=(
    <aside className="w-60 shrink-0 border-r border-line bg-sidebar flex flex-col">
      <div className="px-4 py-4 flex items-center gap-2.5">
        <div className="w-7 h-7 rounded-md grid place-items-center font-bold text-white text-sm" style={{background:"#37352f"}}>S</div>
        <div><div className="font-semibold text-[15px] leading-none text-ntext">sia.haus</div><div className="text-[11px] text-nfaint mt-1">Communication OS</div></div>
      </div>
      <nav className="px-2 pb-3 space-y-0.5 flex-1 overflow-y-auto scrollthin">

        <SecRow icon="⌂" label="대시보드" open={exp.dashboard} active={view==="dashboard"} onToggle={()=>toggle("dashboard")} onNav={()=>goSec("dashboard")}/>
        {exp.dashboard && <div className="space-y-0.5">
          <ChildRow label="진행 현황" icon="•" onClick={()=>{setView("dashboard");setMenu(false);setTimeout(()=>{const e=document.getElementById("dash-projects");e&&e.scrollIntoView({behavior:"smooth",block:"center"});},60);}}/>
          <ChildRow label="다가오는 마감" icon="•" onClick={()=>{setView("dashboard");setMenu(false);setTimeout(()=>{const e=document.getElementById("dash-due");e&&e.scrollIntoView({behavior:"smooth",block:"center"});},60);}}/>
          <ChildRow label="최근 활동" icon="•" onClick={()=>{setView("dashboard");setMenu(false);setTimeout(()=>{const e=document.getElementById("dash-activity");e&&e.scrollIntoView({behavior:"smooth",block:"center"});},60);}}/>
        </div>}

        <SecRow icon="#" label="채널" open={exp.channels} active={view==="channels"} onToggle={()=>toggle("channels")} onNav={()=>goSec("channels")}/>
        {exp.channels && <div className="space-y-0.5">
          {Object.entries(chGroups).map(([g,list])=>(
            <div key={g}>
              <div className="text-[10px] uppercase tracking-wider text-nfaint pl-[34px] pt-1.5 pb-0.5">{g}</div>
              {list.map(c=><ChildRow key={c.id} icon={<span className="text-nfaint">#</span>} label={c.name} locked={c.locked} active={view==="channels"&&cur===c.id} onClick={()=>openChannel(c.id)}/>)}
            </div>
          ))}
        </div>}

        <SecRow icon="▦" label="프로젝트" open={exp.projects} active={view==="projects"} onToggle={()=>toggle("projects")} onNav={()=>goSec("projects")}/>
        {exp.projects && <div className="space-y-0.5">
          {store.projects.map(p=><ChildRow key={p.id} icon={<span className="w-1.5 h-1.5 rounded-full inline-block" style={{background:STATUS_META[p.status].dot}}/>} label={p.name} active={view==="projects"&&proj===p.id} onClick={()=>openProject(p.id)}/>)}
        </div>}

        <SecRow icon="✎" label="회의록" open={exp.meetings} active={view==="meetings"} onToggle={()=>toggle("meetings")} onNav={()=>goSec("meetings")}/>
        {exp.meetings && <div className="space-y-0.5">
          {store.meetings.map(m=><ChildRow key={m.id} icon="•" label={m.title} onClick={()=>focusItem("meetings",m.id)}/>)}
        </div>}

        <SecRow icon="📄" label="지식·템플릿" open={exp.knowledge} active={view==="knowledge"} onToggle={()=>toggle("knowledge")} onNav={()=>goSec("knowledge")}/>
        {exp.knowledge && <div className="space-y-0.5">
          {store.templates.map(t=><ChildRow key={t.id} icon="•" label={t.name} onClick={()=>focusItem("knowledge",t.id)}/>)}
        </div>}

        <SecRow icon="◍" label="멤버" open={exp.members} active={view==="members"} onToggle={()=>toggle("members")} onNav={()=>goSec("members")}/>
        {exp.members && <div className="space-y-0.5">
          {MEMBERS.map(m=><ChildRow key={m.id} icon={<span className="w-2 h-2 rounded-full inline-block" style={{background:m.color}}/>} label={m.name} onClick={()=>goSec("members")}/>)}
        </div>}

      </nav>
      <div className="p-2 border-t border-line">
        <div className="flex items-center gap-2.5 px-2 py-1.5 rounded-md hov">
          <Avatar id={ME.id} size={30}/>
          <div className="min-w-0 flex-1"><div className="text-[14px] font-medium truncate text-ntext">{ME.name}</div><div className="text-[11px] text-nfaint">{ME.role}</div></div>
        </div>
        <button onClick={reset} className="w-full mt-0.5 text-[11px] text-nfaint hover:text-nsub py-1">↺ 데모 초기화</button>
      </div>
    </aside>
  );

  return <div className="h-full flex bg-page">
    <div className="hidden md:flex">{Side}</div>
    {menu && <div className="fixed inset-0 z-40 md:hidden" onClick={()=>setMenu(false)}><div className="absolute inset-0 bg-black/30"/><div className="absolute left-0 top-0 bottom-0" onClick={e=>e.stopPropagation()}>{Side}</div></div>}
    <main className="flex-1 min-w-0 flex flex-col">
      <header className="bg-page/90 backdrop-blur border-b border-line px-4 md:px-7 py-2.5 flex items-center gap-3 sticky top-0 z-30">
        <button className="md:hidden text-xl text-nsub" onClick={()=>setMenu(true)}>☰</button>
        <div className="flex-1 max-w-md">
          <div className="flex items-center gap-2 bg-sidebar border border-line rounded-md px-3 py-1.5">
            <span className="text-nfaint text-sm">🔍</span>
            <input placeholder="검색 (프로젝트·채널·문서)" className="bg-transparent outline-none text-sm w-full text-ntext"/>
          </div>
        </div>
        <Tag bg="#dbeddb" fg="#1c3829" dot="#0f9960">온라인 {MEMBERS.length-1}</Tag>
      </header>
      {view==="channels"
        ? <div className="flex-1 min-h-0 bg-page">{Body}</div>
        : <div className="flex-1 overflow-y-auto scrollthin p-4 md:p-7 bg-page">{Body}</div>}
    </main>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

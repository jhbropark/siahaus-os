function loadStore(){
  try { const r = localStorage.getItem(STORE_KEY); if(r) return JSON.parse(r); } catch(e){}
  return structuredClone(SEED);
}
function saveStore(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){} }

const member = id => MEMBERS.find(m=>m.id===id) || {name:"—",avatar:"?",color:"#9b9a97",role:""};

const STATUS_META = {
  "Inbox":{dot:"#2383e2",bg:"#ddebf1",fg:"#183347",ko:"인입"},
  "Kickoff":{dot:"#dfab01",bg:"#fbf3db",fg:"#5c4b00",ko:"킥오프"},
  "In Progress":{dot:"#0f9960",bg:"#dbeddb",fg:"#1c3829",ko:"진행"},
  "Review":{dot:"#9a6dd7",bg:"#eae4f2",fg:"#412a5e",ko:"리뷰"},
  "Blocked":{dot:"#d9730d",bg:"#faebdd",fg:"#5c3b1e",ko:"막힘"},
  "Delivered":{dot:"#0b7285",bg:"#ddedea",fg:"#183e3b",ko:"납품"},
  "Archived":{dot:"#9b9a97",bg:"#e3e2e0",fg:"#3c3b39",ko:"보관"},
};
const PRIORITY = {
  High:{bg:"#ffe2dd",fg:"#5d1715",dot:"#e03e3e"},
  Mid:{bg:"#fbf3db",fg:"#5c4b00",dot:"#dfab01"},
  Low:{bg:"#e3e2e0",fg:"#3c3b39",dot:"#9b9a97"},
};

function Avatar({id,size=24}){
  const m = member(id);
  return <div className="rounded-full grid place-items-center font-semibold text-white shrink-0"
    style={{width:size,height:size,background:m.color,fontSize:size*0.42}} title={m.name}>{m.avatar}</div>;
}
function Tag({children,bg,fg,dot}){
  return <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[12px] font-medium leading-none"
    style={{background:bg||"#e3e2e0",color:fg||"#3c3b39"}}>
    {dot && <span className="w-1.5 h-1.5 rounded-full" style={{background:dot}}/>}{children}</span>;
}
function Section({title,desc,right,children}){
  return <div className="fadein max-w-[1180px] mx-auto">
    <div className="flex items-end justify-between mb-6">
      <div><h1 className="text-[26px] font-bold tracking-tight text-ntext">{title}</h1>
        {desc && <p className="text-sm text-nsub mt-1">{desc}</p>}</div>
      {right}
    </div>{children}
  </div>;
}

function Dashboard({store, go}){
  const active = store.projects.filter(p=>!["Delivered","Archived"].includes(p.status));
  const dueSoon = store.projects.filter(p=>{
    const d=(new Date(p.due)-new Date())/86400000; return d>=0 && d<=10 && !["Delivered","Archived"].includes(p.status);
  }).sort((a,b)=>new Date(a.due)-new Date(b.due));
  const msgCount = store.channels.reduce((n,c)=>n+c.messages.length,0);
  const stats=[
    {label:"진행 중 프로젝트",val:active.length,sub:"진행 · 리뷰 · 킥오프",dot:"#0f9960",act:()=>go("projects")},
    {label:"10일 내 마감",val:dueSoon.length,sub:"임박 마일스톤",dot:"#e03e3e",act:()=>go("projects")},
    {label:"전체 메시지",val:msgCount,sub:store.channels.length+"개 채널",dot:"#2383e2",act:()=>go("channels")},
    {label:"활성 멤버",val:MEMBERS.length-1,sub:"+ 외부 협업 1",dot:"#d9730d",act:()=>go("members")},
  ];
  return <Section title="대시보드" desc="오늘의 sia.haus 한눈에 보기">
    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
      {stats.map((s,i)=>(
        <button key={i} onClick={s.act} className="ncard nshadow nshadow-h p-4 text-left transition">
          <div className="flex items-center gap-1.5 text-[12px] text-nsub">
            <span className="w-2 h-2 rounded-full" style={{background:s.dot}}/>{s.label}</div>
          <div className="text-[30px] font-bold text-ntext mt-1.5 leading-none">{s.val}</div>
          <div className="text-[11px] text-nfaint mt-1.5">{s.sub}</div>
        </button>
      ))}
    </div>
    <div className="grid lg:grid-cols-3 gap-4">
      <div className="ncard nshadow p-4 lg:col-span-2">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-[15px]">진행 중 프로젝트</h3>
          <button onClick={()=>go("projects")} className="text-[13px] text-nsub hover:text-ntext">보드 열기 →</button>
        </div>
        <div className="-mx-2">
          {active.map(p=>(
            <button key={p.id} onClick={()=>go("projects")} className="w-full flex items-center gap-3 px-2 py-2 rounded-md hov text-left transition">
              <Tag bg={STATUS_META[p.status].bg} fg={STATUS_META[p.status].fg} dot={STATUS_META[p.status].dot}>{STATUS_META[p.status].ko}</Tag>
              <div className="min-w-0 flex-1">
                <div className="text-[14px] font-medium truncate text-ntext">{p.name}</div>
                <div className="text-[12px] text-nfaint">{p.domain} · {p.client} · ~{p.due}</div>
              </div>
              <Tag bg={PRIORITY[p.priority].bg} fg={PRIORITY[p.priority].fg}>{p.priority}</Tag>
              <Avatar id={p.owner} size={22}/>
            </button>
          ))}
        </div>
      </div>
      <div className="ncard nshadow p-4">
        <h3 className="font-semibold text-[15px] mb-3">최근 활동</h3>
        <div className="space-y-3">
          {store.activity.map(a=>(
            <div key={a.id} className="flex gap-2.5">
              <Avatar id={a.who} size={24}/>
              <div className="min-w-0">
                <div className="text-[13px] leading-snug text-ntext"><b className="font-semibold">{member(a.who).name}</b> {a.text}</div>
                <div className="text-[11px] text-nfaint">{a.t.slice(5)}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
    <div className="ncard nshadow p-4 mt-4">
      <h3 className="font-semibold text-[15px] mb-3">다가오는 마감</h3>
      <div className="flex gap-3 overflow-x-auto scrollthin pb-1">
        {dueSoon.length===0 && <div className="text-sm text-nfaint">임박한 마감이 없습니다.</div>}
        {dueSoon.map(p=>{
          const d=Math.ceil((new Date(p.due)-new Date())/86400000);
          return <div key={p.id} className="ncard p-3 min-w-[190px]">
            <div className="text-[11px] text-nfaint">{p.due}</div>
            <div className="text-[13px] font-medium mt-1 line-clamp-2 text-ntext">{p.name}</div>
            <div className="mt-2"><Tag bg={d<=2?"#ffe2dd":"#fbf3db"} fg={d<=2?"#5d1715":"#5c4b00"}>D-{d}</Tag></div>
          </div>;
        })}
      </div>
    </div>
  </Section>;
}

/* CHANNELS — 메시지 영역만 (채널 목록은 사이드바에) */
function Channels({store,setStore,cur,setCur}){
  const [text,setText]=useState("");
  const endRef=useRef(null);
  const ch = store.channels.find(c=>c.id===cur) || store.channels[0];
  useEffect(()=>{ endRef.current && endRef.current.scrollIntoView(); },[cur,ch&&ch.messages.length]);
  function send(){
    if(!text.trim()) return;
    const now=new Date(); const t=now.toISOString().slice(0,16).replace("T"," ");
    const msg={id:"m"+Date.now(),who:ME.id,t,text:text.trim()};
    setStore(s=>{const ns=structuredClone(s);ns.channels.find(c=>c.id===ch.id).messages.push(msg);
      ns.activity.unshift({id:"a"+Date.now(),who:ME.id,t,text:`#${ch.name} 에 메시지 작성`});ns.activity=ns.activity.slice(0,8);return ns;});
    setText("");
  }
  return <div className="fadein ncard overflow-hidden max-w-[1180px] mx-auto flex flex-col h-[calc(100vh-118px)]">
    <div className="px-5 py-3 border-b border-line flex items-center gap-2 shrink-0">
      <span className="text-nfaint">#</span><span className="font-semibold text-[15px]">{ch.name}</span>
      {ch.locked && <Tag bg="#ffe2dd" fg="#5d1715">리더 공지</Tag>}
      <span className="ml-auto text-[12px] text-nfaint">{ch.messages.length}개 메시지</span>
    </div>
    <div className="flex-1 overflow-y-auto scrollthin px-5 py-4 space-y-4">
      {ch.messages.length===0 && <div className="text-sm text-nfaint mt-8 text-center">아직 메시지가 없습니다. 첫 메시지를 남겨보세요.</div>}
      {ch.messages.map(m=>(
        <div key={m.id} className="flex gap-3">
          <Avatar id={m.who} size={34}/>
          <div className="min-w-0">
            <div className="flex items-baseline gap-2">
              <b className="font-semibold text-[14px]">{member(m.who).name}</b>
              <span className="text-[11px] text-nfaint">{member(m.who).role}</span>
              <span className="text-[11px] text-nfaint">{m.t.slice(5)}</span>
            </div>
            <div className="text-[14px] text-ntext whitespace-pre-wrap leading-relaxed">{m.text}</div>
          </div>
        </div>
      ))}
      <div ref={endRef}/>
    </div>
    <div className="p-3 border-t border-line shrink-0">
      <div className="flex items-center gap-2 bg-sidebar border border-line rounded-lg px-3 py-2">
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}
          placeholder={`#${ch.name} 에 메시지 보내기…`} className="flex-1 bg-transparent outline-none text-sm" />
        <button onClick={send} className="text-sm font-medium btn-dark px-3 py-1 rounded-md">보내기</button>
      </div>
    </div>
  </div>;
}

function Projects({store,setStore}){
  const [sel,setSel]=useState(null);
  const [adding,setAdding]=useState(false);
  function move(pid,dir){
    setStore(s=>{const ns=structuredClone(s);const p=ns.projects.find(x=>x.id===pid);
      let i=STATUSES.indexOf(p.status); i=Math.max(0,Math.min(STATUSES.length-1,i+dir)); p.status=STATUSES[i];return ns;});
  }
  function toggleTask(pid,tid){
    setStore(s=>{const ns=structuredClone(s);const p=ns.projects.find(x=>x.id===pid);const t=p.tasks.find(x=>x.id===tid);t.done=!t.done;return ns;});
  }
  const selP = sel && store.projects.find(p=>p.id===sel);
  return <Section title="프로젝트 보드" desc="상태별 보드 · 모든 프로젝트는 추적된다"
    right={<button onClick={()=>setAdding(true)} className="text-[13px] btn-dark font-medium px-3 py-1.5 rounded-md">+ 새 프로젝트</button>}>
    <div className="flex gap-3 overflow-x-auto scrollthin pb-2">
      {STATUSES.map(st=>{
        const items=store.projects.filter(p=>p.status===st);
        const meta=STATUS_META[st];
        return <div key={st} className="bg-col rounded-lg p-2 min-w-[268px] w-[268px] shrink-0">
          <div className="flex items-center gap-1.5 px-1.5 py-1.5">
            <Tag bg={meta.bg} fg={meta.fg} dot={meta.dot}>{meta.ko}</Tag>
            <span className="text-[12px] text-nfaint">{items.length}</span>
          </div>
          <div className="space-y-2">
            {items.map(p=>(
              <div key={p.id} className="bg-page nshadow nshadow-h border border-line rounded-md p-2.5 transition cursor-pointer" onClick={()=>setSel(p.id)}>
                <div className="text-[14px] font-medium leading-snug text-ntext">{p.name}</div>
                <div className="flex items-center gap-1.5 mt-2 flex-wrap">
                  <Tag bg={PRIORITY[p.priority].bg} fg={PRIORITY[p.priority].fg} dot={PRIORITY[p.priority].dot}>{p.priority}</Tag>
                  <Tag>{p.domain}</Tag>
                </div>
                <div className="flex items-center justify-between mt-2.5">
                  <span className="text-[11px] text-nfaint">~{p.due.slice(5)}</span>
                  <div className="flex items-center gap-2">
                    {p.tasks.length>0 && <span className="text-[11px] text-nfaint">{p.tasks.filter(t=>t.done).length}/{p.tasks.length} ✓</span>}
                    <Avatar id={p.owner} size={20}/>
                  </div>
                </div>
                <div className="flex gap-1 mt-2 pt-2 border-t border-line2" onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>move(p.id,-1)} className="flex-1 text-[12px] py-1 rounded hov text-nsub">←</button>
                  <button onClick={()=>move(p.id,1)} className="flex-1 text-[12px] py-1 rounded hov text-nsub">→</button>
                </div>
              </div>
            ))}
            {items.length===0 && <div className="text-[12px] text-nfaint px-1.5 py-2">비어 있음</div>}
          </div>
        </div>;
      })}
    </div>
    {selP && <Modal onClose={()=>setSel(null)}>
      <div className="flex items-start gap-2 mb-1">
        <h2 className="text-lg font-bold flex-1 text-ntext">{selP.name}</h2>
        <Tag bg={STATUS_META[selP.status].bg} fg={STATUS_META[selP.status].fg} dot={STATUS_META[selP.status].dot}>{STATUS_META[selP.status].ko}</Tag>
      </div>
      <div className="text-sm text-nsub mb-4">{selP.domain} · {selP.client} · 마감 {selP.due}</div>
      <div className="grid grid-cols-2 gap-3 mb-4 text-sm">
        <Info label="담당"><div className="flex items-center gap-2"><Avatar id={selP.owner} size={22}/>{member(selP.owner).name}</div></Info>
        <Info label="우선순위"><Tag bg={PRIORITY[selP.priority].bg} fg={PRIORITY[selP.priority].fg} dot={PRIORITY[selP.priority].dot}>{selP.priority}</Tag></Info>
        <Info label="참여자"><div className="flex gap-1">{selP.members.length?selP.members.map(m=><Avatar key={m} id={m} size={22}/>):<span className="text-nfaint">—</span>}</div></Info>
        <Info label="상태 이동"><div className="flex gap-1">
          <button onClick={()=>move(selP.id,-1)} className="text-xs px-2 py-1 rounded border border-line hov text-nsub">← 이전</button>
          <button onClick={()=>move(selP.id,1)} className="text-xs px-2 py-1 rounded border border-line hov text-nsub">다음 →</button>
        </div></Info>
      </div>
      <div className="text-sm font-semibold mb-2">작업 (Tasks)</div>
      <div className="-mx-1">
        {selP.tasks.length===0 && <div className="text-sm text-nfaint px-1">등록된 작업이 없습니다.</div>}
        {selP.tasks.map(t=>(
          <button key={t.id} onClick={()=>toggleTask(selP.id,t.id)} className="w-full flex items-center gap-2 p-1.5 rounded-md hov text-left">
            <span className={"w-4 h-4 rounded grid place-items-center text-[10px] "+(t.done?"bg-[#0f9960] text-white":"border border-[#c7c6c3]")}>{t.done?"✓":""}</span>
            <span className={"text-sm "+(t.done?"line-through text-nfaint":"text-ntext")}>{t.name}</span>
          </button>
        ))}
      </div>
    </Modal>}
    {adding && <AddProject onClose={()=>setAdding(false)} onAdd={(p)=>{
      setStore(s=>{const ns=structuredClone(s);ns.projects.unshift(p);
        ns.activity.unshift({id:"a"+Date.now(),who:ME.id,t:new Date().toISOString().slice(0,16).replace("T"," "),text:`새 프로젝트 ‘${p.name}’ 생성`});return ns;});
      setAdding(false);
    }}/>}
  </Section>;
}
function Info({label,children}){return <div><div className="text-[11px] text-nfaint mb-1">{label}</div>{children}</div>;}

function AddProject({onClose,onAdd}){
  const [f,setF]=useState({name:"",domain:"영상",client:"",due:"",priority:"Mid"});
  return <Modal onClose={onClose}>
    <h2 className="text-lg font-bold mb-4 text-ntext">새 프로젝트</h2>
    <div className="space-y-3">
      <Field label="프로젝트명"><input className="inp" value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="예: 신규 브랜드 필름"/></Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="도메인"><select className="inp" value={f.domain} onChange={e=>setF({...f,domain:e.target.value})}>{["영상","디자인","브랜드IP","사업기획","개발"].map(d=><option key={d}>{d}</option>)}</select></Field>
        <Field label="우선순위"><select className="inp" value={f.priority} onChange={e=>setF({...f,priority:e.target.value})}>{["High","Mid","Low"].map(d=><option key={d}>{d}</option>)}</select></Field>
        <Field label="클라이언트"><input className="inp" value={f.client} onChange={e=>setF({...f,client:e.target.value})} placeholder="내부 / 외부사"/></Field>
        <Field label="마감일"><input type="date" className="inp" value={f.due} onChange={e=>setF({...f,due:e.target.value})}/></Field>
      </div>
    </div>
    <div className="flex justify-end gap-2 mt-5">
      <button onClick={onClose} className="text-sm px-3 py-1.5 rounded-md border border-line hov text-nsub">취소</button>
      <button disabled={!f.name} onClick={()=>onAdd({id:"p"+Date.now(),name:f.name,domain:f.domain,status:"Inbox",owner:ME.id,members:[],client:f.client||"내부",due:f.due||"2026-12-31",priority:f.priority,tasks:[]})}
        className="text-sm px-3 py-1.5 rounded-md btn-dark disabled:opacity-40">생성</button>
    </div>
  </Modal>;
}
function Field({label,children}){return <div><div className="text-[12px] text-nsub mb-1">{label}</div>{children}</div>;}

function Meetings({store}){
  const [sel,setSel]=useState(store.meetings[0]?.id);
  const m = store.meetings.find(x=>x.id===sel);
  return <Section title="회의록" desc="모든 회의의 결정과 액션을 기록">
    <div className="grid lg:grid-cols-3 gap-4">
      <div className="space-y-2">
        {store.meetings.map(mt=>(
          <button key={mt.id} onClick={()=>setSel(mt.id)}
            className={"w-full ncard nshadow-h p-3 text-left transition "+(mt.id===sel?"border-[#c7c6c3] bg-sidebar":"")}>
            <div className="text-[14px] font-medium text-ntext">{mt.title}</div>
            <div className="text-[11px] text-nfaint mt-0.5">{mt.date}</div>
            <div className="flex -space-x-1.5 mt-2">{mt.attendees.slice(0,5).map(a=><span key={a} className="ring-2 ring-white rounded-full"><Avatar id={a} size={20}/></span>)}</div>
          </button>
        ))}
      </div>
      {m && <div className="lg:col-span-2 ncard nshadow p-5">
        <h2 className="text-lg font-bold text-ntext">{m.title}</h2>
        <div className="text-sm text-nsub mt-0.5">{m.date} · 참석 {m.attendees.map(a=>member(a).name).join(", ")}</div>
        <div className="mt-4">
          <div className="text-sm font-semibold mb-2">⭐ 결정 사항</div>
          {m.decisions.map((d,i)=>(
            <div key={i} className="bg-sidebar border border-line rounded-md p-3 mb-2">
              <div className="text-sm font-medium text-ntext">{d.what}</div>
              <div className="text-[12px] text-nsub mt-1">이유: {d.why} · 결정 {member(d.who).name}</div>
            </div>
          ))}
        </div>
        <div className="mt-4">
          <div className="text-sm font-semibold mb-2">✅ 액션 아이템</div>
          {m.actions.map((a,i)=>(
            <div key={i} className="flex items-center gap-2 text-sm py-2 border-b border-line last:border-0">
              <span className="flex-1 text-ntext">{a.task}</span>
              <Tag>{a.who==="all"?"전원":member(a.who).name}</Tag>
              <span className="text-[12px] text-nfaint">~{a.due.slice(5)}</span>
            </div>
          ))}
        </div>
      </div>}
    </div>
  </Section>;
}

function Knowledge({store}){
  const [sel,setSel]=useState(null);
  const [copied,setCopied]=useState(false);
  const t = sel && store.templates.find(x=>x.id===sel);
  return <Section title="지식 · 템플릿" desc="재사용 가능한 표준 문서 — 복사해서 바로 사용">
    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
      {store.templates.map(tp=>(
        <button key={tp.id} onClick={()=>{setSel(tp.id);setCopied(false);}} className="ncard nshadow nshadow-h p-4 text-left transition">
          <div className="flex items-center justify-between"><Tag>{tp.tag}</Tag><span className="text-nfaint text-lg">📄</span></div>
          <div className="font-semibold mt-2 text-ntext">{tp.name}</div>
          <div className="text-[12px] text-nsub mt-1 line-clamp-2">{tp.body.split("\n").slice(1,3).join(" ").replace(/#/g,"")}</div>
        </button>
      ))}
    </div>
    {t && <Modal onClose={()=>setSel(null)}>
      <div className="flex items-center gap-2 mb-3"><Tag>{t.tag}</Tag><h2 className="text-lg font-bold text-ntext">{t.name}</h2></div>
      <pre className="bg-sidebar border border-line rounded-md p-4 text-[13px] whitespace-pre-wrap text-ntext scrollthin max-h-[50vh] overflow-y-auto font-sans">{t.body}</pre>
      <div className="flex justify-end mt-4">
        <button onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(t.body);setCopied(true);}} className="text-sm px-3 py-1.5 rounded-md btn-dark">{copied?"✓ 복사됨":"📋 복사"}</button>
      </div>
    </Modal>}
  </Section>;
}

function Members(){
  return <Section title="멤버 · 역할" desc="조직 구성과 권한 등급">
    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
      {MEMBERS.map(m=>(
        <div key={m.id} className="ncard nshadow p-4 flex items-center gap-3">
          <Avatar id={m.id} size={42}/>
          <div className="min-w-0">
            <div className="font-semibold text-ntext">{m.name}</div>
            <div className="text-[12px] text-nsub">{m.role}</div>
          </div>
        </div>
      ))}
    </div>
    <div className="ncard nshadow p-5 mt-4">
      <h3 className="font-semibold mb-3">권한 등급 요약</h3>
      <div className="overflow-x-auto"><table className="w-full text-sm">
        <thead><tr className="text-nfaint text-[12px] text-left border-b border-line">
          <th className="py-2 pr-4 font-medium">역할</th><th className="pr-4 font-medium">채널</th><th className="pr-4 font-medium">프로젝트</th><th className="font-medium">외부 접근</th></tr></thead>
        <tbody className="text-ntext">
          {[["CEO","전체 + 공지작성","전체 관리","전체"],
            ["Creative Director","전체 + 공지작성","전체 관리","전체"],
            ["Lead","업무채널 + 일부공지","담당 도메인","담당"],
            ["Member","업무채널 작성","담당 카드","담당"],
            ["Collaborator","초대 채널만","초대 카드만","초대분만"]].map((r,i)=>(
            <tr key={i} className="border-b border-line last:border-0">
              {r.map((c,j)=><td key={j} className="py-2.5 pr-4">{c}</td>)}
            </tr>
          ))}
        </tbody>
      </table></div>
    </div>
  </Section>;
}

function Modal({children,onClose}){
  useEffect(()=>{const h=e=>e.key==="Escape"&&onClose();window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);
  return <div className="fixed inset-0 z-50 grid place-items-center p-4" style={{background:"rgba(15,15,15,.35)"}} onClick={onClose}>
    <div className="bg-page rounded-lg p-5 w-full max-w-lg max-h-[88vh] overflow-y-auto scrollthin fadein nshadow border border-line" onClick={e=>e.stopPropagation()}>{children}</div>
  </div>;
}

function App(){
  const [store,setStore]=useState(loadStore);
  const [view,setView]=useState("dashboard");
  const [menu,setMenu]=useState(false);
  const [chOpen,setChOpen]=useState(true);
  const [cur,setCur]=useState(store.channels[0].id);
  useEffect(()=>saveStore(store),[store]);
  function reset(){ if(confirm("데모 데이터를 초기 상태로 되돌릴까요?")){localStorage.removeItem(STORE_KEY);setStore(structuredClone(SEED));setCur(SEED.channels[0].id);} }

  const chGroups = useMemo(()=>{
    const g={}; store.channels.forEach(c=>{(g[c.group]=g[c.group]||[]).push(c)}); return g;
  },[store.channels]);

  const Body={dashboard:<Dashboard store={store} go={setView}/>,channels:<Channels store={store} setStore={setStore} cur={cur} setCur={setCur}/>,
    projects:<Projects store={store} setStore={setStore}/>,meetings:<Meetings store={store}/>,
    knowledge:<Knowledge store={store}/>,members:<Members/>}[view];

  const navItem=(id,label,icon)=>(
    <button onClick={()=>{setView(id);setMenu(false);}}
      className={"w-full flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-[14px] transition "+(view===id?"bg-[rgba(55,53,47,.08)] text-ntext font-medium":"text-nsub hov")}>
      <span className="w-4 text-center text-nfaint">{icon}</span>{label}
    </button>
  );

  const Side=(
    <aside className="w-60 shrink-0 border-r border-line bg-sidebar flex flex-col">
      <div className="px-4 py-4 flex items-center gap-2.5">
        <div className="w-7 h-7 rounded-md grid place-items-center font-bold text-white text-sm" style={{background:"#37352f"}}>S</div>
        <div><div className="font-semibold text-[15px] leading-none text-ntext">sia.haus</div><div className="text-[11px] text-nfaint mt-1">Communication OS</div></div>
      </div>
      <nav className="px-2 space-y-0.5 flex-1 overflow-y-auto scrollthin">
        {navItem("dashboard","대시보드","⌂")}

        {/* 채널 (접기/펼치기) */}
        <div>
          <div className={"w-full flex items-center gap-1 pl-1 pr-2 py-1.5 rounded-md text-[14px] transition "+(view==="channels"?"bg-[rgba(55,53,47,.08)] text-ntext font-medium":"text-nsub hov")}>
            <button onClick={()=>setChOpen(o=>!o)} className="w-5 h-5 grid place-items-center rounded hover:bg-[rgba(55,53,47,.08)] text-nfaint shrink-0">
              <span className="text-[10px]" style={{transform:chOpen?"rotate(90deg)":"none",transition:"transform .15s"}}>▶</span>
            </button>
            <button onClick={()=>{setView("channels");setChOpen(true);setMenu(false);}} className="flex items-center gap-2 flex-1 text-left">
              <span className="w-4 text-center text-nfaint">#</span>채널
            </button>
          </div>
          {chOpen && <div className="mt-0.5 space-y-0.5">
            {Object.entries(chGroups).map(([g,list])=>(
              <div key={g} className="pl-3">
                <div className="text-[10px] uppercase tracking-wider text-nfaint px-2 pt-1.5 pb-0.5">{g}</div>
                {list.map(c=>(
                  <button key={c.id} onClick={()=>{setCur(c.id);setView("channels");setMenu(false);}}
                    className={"w-full flex items-center gap-1.5 pl-2.5 pr-2 py-1.5 rounded-md text-[13.5px] text-left transition "+(view==="channels"&&cur===c.id?"bg-[rgba(55,53,47,.08)] text-ntext font-medium":"text-nsub hov")}>
                    <span className="text-nfaint">#</span><span className="truncate">{c.name}</span>
                    {c.locked && <span className="ml-auto text-[10px]">🔒</span>}
                  </button>
                ))}
              </div>
            ))}
          </div>}
        </div>

        {navItem("projects","프로젝트","▦")}
        {navItem("meetings","회의록","✎")}
        {navItem("knowledge","지식·템플릿","📄")}
        {navItem("members","멤버","◍")}
      </nav>
      <div className="p-2 border-t border-line">
        <div className="flex items-center gap-2.5 px-2 py-1.5 rounded-md hov">
          <Avatar id={ME.id} size={30}/>
          <div className="min-w-0 flex-1"><div className="text-[14px] font-medium truncate text-ntext">{ME.name}</div><div className="text-[11px] text-nfaint">{ME.role}</div></div>
        </div>
        <button onClick={reset} className="w-full mt-0.5 text-[11px] text-nfaint hover:text-nsub py-1">↺ 데모 초기화</button>
      </div>
    </aside>
  );

  return <div className="h-full flex bg-page">
    <div className="hidden md:flex">{Side}</div>
    {menu && <div className="fixed inset-0 z-40 md:hidden" onClick={()=>setMenu(false)}><div className="absolute inset-0 bg-black/30"/><div className="absolute left-0 top-0 bottom-0" onClick={e=>e.stopPropagation()}>{Side}</div></div>}
    <main className="flex-1 min-w-0 flex flex-col">
      <header className="bg-page/90 backdrop-blur border-b border-line px-4 md:px-7 py-2.5 flex items-center gap-3 sticky top-0 z-30">
        <button className="md:hidden text-xl text-nsub" onClick={()=>setMenu(true)}>☰</button>
        <div className="flex-1 max-w-md">
          <div className="flex items-center gap-2 bg-sidebar border border-line rounded-md px-3 py-1.5">
            <span className="text-nfaint text-sm">🔍</span>
            <input placeholder="검색 (프로젝트·채널·문서)" className="bg-transparent outline-none text-sm w-full text-ntext"/>
          </div>
        </div>
        <Tag bg="#dbeddb" fg="#1c3829" dot="#0f9960">온라인 {MEMBERS.length-1}</Tag>
      </header>
      <div className="flex-1 overflow-y-auto scrollthin p-4 md:p-7 bg-page">{Body}</div>
    </main>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
